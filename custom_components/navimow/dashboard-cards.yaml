## HACS Cards (Optional)

For better cards, install from HACS:

1. **Card Mod** - For card styling
2. **Mini Graph Card** - For history graphs
3. **Map Card** - For better map (if not built-in)

### Mini Graph Example
```yaml
type: custom:mini-graph-card
entity: sensor.navimow_xxxxx_battery
name: Battery History
hours_to_show: 24
points_per_hour: 4
```

---

## One-Click Card (With Plugins)

If you have HACS plugins installed:

```yaml
type: custom:stack-in-card
title: Navimow Dashboard
cards:
  - type: gauge
    entity: sensor.YOUR_DEVICE_battery
    min: 0
    max: 100
    unit: '%'
  - type: entities
    entities:
      - entity: lawn_mower.navimow
      - entity: sensor.YOUR_DEVICE_status
  - type: map
    default_zoom: 18
    entities:
      - entity: device_tracker.YOUR_DEVICE_location
```